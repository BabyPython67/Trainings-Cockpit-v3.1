<!-- Sichtbare Fehlermeldung statt ewigem Ladebildschirm -->
<script>
  window.__mounted = false;
  window.__failShown = false;
  window.__failMsg = function(msg){
    if (window.__failShown || window.__mounted) return; // erste (konkrete) Ursache gewinnt
    window.__failShown = true;
    var r = document.getElementById("root");
    if (r) r.innerHTML = '<div class="__errbox"><h2>Trainings-Cockpit konnte nicht starten</h2><p>' + msg + '</p><p class="hint">Meist hilft: Seite komplett neu laden (Strg/Cmd + Shift + R) oder kurz die Internetverbindung pr&uuml;fen. Bleibt es h&auml;ngen, schick mir bitte genau diesen Text.</p></div>';
  };
  window.addEventListener("error", function(ev){
    if (window.__mounted) return;
    var src = ev && ev.target && (ev.target.src || ev.target.href);
    window.__failMsg(src ? ("Ein Baustein konnte nicht geladen werden: " + src) : ("Fehler: " + (ev && ev.message ? ev.message : "unbekannt")));
  }, true);
  setTimeout(function(){
    // Nur zeigen, wenn noch KEINE konkretere Ursache angezeigt wurde
    window.__failMsg("Die Bausteine (React, Diagramme &hellip;) konnten nicht rechtzeitig geladen werden &ndash; vermutlich Internet/CDN. Bitte neu laden.");
  }, 10000);
  // Datenspeicher: gleiche Schnittstelle wie in der App, lokal im Browser
  window.storage = window.storage || {
    get: async function(k){ try { var v = localStorage.getItem(k); return v == null ? null : { key:k, value:v }; } catch(e){ return null; } },
    set: async function(k,v){ try { localStorage.setItem(k, v); return { key:k }; } catch(e){ return null; } },
    delete: async function(k){ try { localStorage.removeItem(k); return { key:k, deleted:true }; } catch(e){ return null; } },
    list: async function(){ return { keys: [] }; }
  };
</script>
